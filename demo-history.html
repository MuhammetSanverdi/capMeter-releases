<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapMeter — History</title>
<style>
:root {
  --c: #34d399;
  --border: rgba(255,255,255,0.07);
  --surface: rgba(255,255,255,0.05);
  --text: rgba(255,255,255,0.92);
  --muted: rgba(255,255,255,0.36);
  --r: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 300px; height: 440px;
  background: transparent;
  border-radius: var(--r);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  user-select: none;
}
.app {
  width: 100%; height: 100%;
  background: #1d2258;
  border-radius: var(--r);
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* Header — identical to demo-popup.html */
.header {
  display: flex; align-items: center;
  padding: 13px 13px 10px; gap: 9px; flex-shrink: 0;
}
.avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: #34C759; color: rgba(0,0,0,0.72);
  font-size: 11px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; letter-spacing: -0.02em;
}
.id-block { flex: 1; min-width: 0; overflow: hidden; }
.id-name { font-size: 12px; font-weight: 600; line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.id-plan { font-size: 10px; font-weight: 600; color: #34C759; text-transform: uppercase; letter-spacing: 0.04em; margin-top: 3px; }
.actions { display: flex; gap: 1px; }
.btn-icon {
  width: 26px; height: 26px; background: none; border: none;
  border-radius: 6px; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
}
.btn-icon.active { background: var(--surface); color: var(--text); }

/* Page body — gap:0, padding-top:12px (matches historyBody in real popup) */
.page-body {
  flex: 1; padding: 12px 14px 14px;
  overflow-y: auto; display: flex; flex-direction: column;
  gap: 0; min-height: 0;
}
.page-body::-webkit-scrollbar { width: 3px; }
.page-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 99px; }

/* Stats row */
.h-stats-row {
  display: flex; flex-shrink: 0;
  margin-bottom: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 9px; overflow: hidden;
}
.h-stat {
  flex: 1; text-align: center; padding: 8px 4px;
  border-right: 1px solid var(--border);
}
.h-stat:last-child { border-right: none; }
.h-stat-val {
  font-size: 17px; font-weight: 700;
  font-variant-numeric: tabular-nums; line-height: 1; letter-spacing: -0.5px;
}
.h-stat-lbl {
  font-size: 8px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.05em; margin-top: 3px;
}

/* Weekly compare */
.h-weekly-row {
  flex-shrink: 0; margin-bottom: 8px; padding: 7px 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border); border-radius: 8px;
  display: flex; align-items: center; justify-content: space-between;
}

/* Chart */
.h-top-row {
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; margin-bottom: 10px;
}
.h-top-title {
  font-size: 9px; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--muted); opacity: 0.5;
}
.h-period-row { display: flex; gap: 3px; }
.h-period-btn {
  background: none; border: 1px solid var(--border);
  border-radius: 5px; padding: 2px 7px;
  font-family: inherit; font-size: 9px; font-weight: 600;
  color: var(--muted); cursor: default;
}
.h-period-btn.active {
  background: rgba(255,255,255,0.10);
  border-color: rgba(255,255,255,0.20);
  color: var(--text);
}
.h-chart-wrap { position: relative; flex-shrink: 0; }
#historyChart { display: block; width: 100%; overflow: visible; cursor: default; }
.h-chart-dates {
  display: flex; justify-content: space-between; margin-top: 3px; flex-shrink: 0;
}
.h-chart-date { font-size: 9px; color: var(--muted); opacity: 0.4; }

/* Divider + sub-label */
.h-divider { height: 1px; background: var(--border); margin: 10px 0; flex-shrink: 0; }
.h-sub-label {
  font-size: 9px; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--muted); opacity: 0.5;
  margin-bottom: 5px; flex-shrink: 0;
}

/* List */
.h-list-wrap {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column; min-height: 0;
}
.h-list-wrap::-webkit-scrollbar { width: 3px; }
.h-list-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 99px; }
.h-entry {
  display: flex; align-items: center; gap: 10px;
  padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); flex-shrink: 0;
}
.h-entry:last-child { border-bottom: none; }
.h-entry-date { font-size: 11px; font-variant-numeric: tabular-nums; flex-shrink: 0; width: 60px; white-space: nowrap; }
.h-bar-track { flex: 1; height: 5px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; }
.h-bar-fill { height: 100%; border-radius: 99px; }
.h-pct { font-size: 11px; font-weight: 700; font-variant-numeric: tabular-nums; flex-shrink: 0; width: 36px; text-align: right; }

/* Export buttons */
.h-actions { display: flex; gap: 6px; padding: 10px 0 0; flex-shrink: 0; }
.btn-hist-clear {
  background: none; border: none; padding: 4px 2px;
  font-family: inherit; font-size: 10px; font-weight: 500;
  color: var(--muted); cursor: default; flex-shrink: 0; opacity: 0.5; letter-spacing: -0.01em;
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="avatar">MU</div>
    <div class="id-block">
      <div class="id-name">Muhammet C...</div>
      <div class="id-plan">CLAUDE PRO</div>
    </div>
    <div class="actions">
      <div class="btn-icon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-.49-6.5"/>
        </svg>
      </div>
      <div class="btn-icon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
          <polyline points="9 21 9 12 15 12 15 21"/>
        </svg>
      </div>
      <div class="btn-icon active">
        <svg width="13" height="10" viewBox="0 0 13 10" fill="currentColor">
          <rect x="0" y="6" width="3" height="4" rx="1"/>
          <rect x="5" y="3" width="3" height="7" rx="1"/>
          <rect x="10" y="0" width="3" height="10" rx="1"/>
        </svg>
      </div>
      <div class="btn-icon">
        <svg width="13" height="13" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
        </svg>
      </div>
      <div class="btn-icon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="page-body">

    <div class="h-stats-row">
      <div class="h-stat">
        <div class="h-stat-val" style="color:var(--text)">61%</div>
        <div class="h-stat-lbl">14D Avg.</div>
      </div>
      <div class="h-stat">
        <div class="h-stat-val" style="color:var(--text)">100%</div>
        <div class="h-stat-lbl">Highest</div>
      </div>
      <div class="h-stat">
        <div class="h-stat-val" style="color:var(--text)">38%</div>
        <div class="h-stat-lbl">Today</div>
      </div>
      <div class="h-stat">
        <div class="h-stat-val" style="color:#FF9500">🔥7d</div>
        <div class="h-stat-lbl">Streak</div>
      </div>
    </div>

    <div class="h-weekly-row">
      <span style="font-size:10px;color:var(--muted);font-weight:500">This week</span>
      <span style="font-size:11px;font-weight:700;color:var(--text)">62%
        <span style="font-size:10px;font-weight:600;color:#34C759">↑ +38%</span>
        <span style="font-size:9px;font-weight:400;color:var(--muted)"> vs last week</span>
      </span>
    </div>

    <div class="h-top-row">
      <span class="h-top-title">Chart</span>
      <div class="h-period-row">
        <button class="h-period-btn">7D</button>
        <button class="h-period-btn active">14D</button>
        <button class="h-period-btn">30D</button>
        <button class="h-period-btn">90D</button>
      </div>
    </div>

    <div class="h-chart-wrap">
      <svg id="historyChart" height="60" viewBox="0 0 272 60" style="width:100%"></svg>
    </div>
    <div class="h-chart-dates">
      <span class="h-chart-date">Jul 4</span>
      <span class="h-chart-date">Today</span>
    </div>

    <div class="h-divider"></div>
    <div class="h-sub-label">Last 14 Days · Daily Peak</div>

    <div class="h-list-wrap" id="historyList"></div>

    <div class="h-actions">
      <button class="btn-hist-clear">Export CSV</button>
      <button class="btn-hist-clear">Export JSON</button>
      <button class="btn-hist-clear" style="margin-left:auto">Clear</button>
    </div>

  </div>
</div>
<script>
(function() {
  /* barColor — exact copy from popup.html */
  function barColor(pct) {
    if (!pct) return { fill: 'rgba(255,255,255,0.06)', opacity: 1 };
    if (pct < 30) return { fill: '#34C759', opacity: 0.25 };
    if (pct < 60) return { fill: '#34C759', opacity: 0.55 };
    if (pct < 80) return { fill: '#34C759', opacity: 0.80 };
    return { fill: '#34C759', opacity: 1 };
  }

  /* 14-day data — 10 active days, avg 65%, streak 7 (Jul 11–17), highest 100% */
  var data = [
    { label: 'Jul 4',  pct: 65 },
    { label: 'Jul 5',  pct: 0  },
    { label: 'Jul 6',  pct: 0  },
    { label: 'Jul 7',  pct: 60 },
    { label: 'Jul 8',  pct: 45 },
    { label: 'Jul 9',  pct: 0  },
    { label: 'Jul 10', pct: 0  },
    { label: 'Jul 11', pct: 52 },
    { label: 'Jul 12', pct: 65 },
    { label: 'Jul 13', pct: 58 },
    { label: 'Jul 14', pct: 100},
    { label: 'Jul 15', pct: 48 },
    { label: 'Jul 16', pct: 74 },
    { label: 'Today',  pct: 38 }
  ];

  var W = 272, H = 56, n = data.length;
  var gap = 2;
  var barW = Math.max(1, Math.floor((W - gap * (n - 1)) / n));
  var step = barW + gap;

  var active = data.filter(function(d){ return d.pct > 0; });
  var avgPct = Math.round(active.reduce(function(s,d){ return s + d.pct; }, 0) / active.length);
  var avgY = H - 2 - Math.round((avgPct / 100) * (H - 4));

  /* Chart */
  var svg = document.getElementById('historyChart');
  var html = '<line x1="0" y1="' + avgY + '" x2="' + W + '" y2="' + avgY + '" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="3,2"/>';

  data.forEach(function(d, i) {
    var x = i * step;
    if (d.pct > 0) {
      var h = Math.max(3, Math.round((d.pct / 100) * (H - 4)));
      var barTop = H - 2 - h;
      var bc = barColor(d.pct);
      var bOp = i === n - 1 ? 1 : bc.opacity * 0.85;
      html += '<rect x="' + x + '" y="' + barTop + '" width="' + barW + '" height="' + h + '" fill="' + bc.fill + '" fill-opacity="' + bOp + '" rx="1.5"/>';
    } else {
      html += '<rect x="' + x + '" y="' + (H - 3) + '" width="' + barW + '" height="3" fill="rgba(255,255,255,0.06)" rx="1"/>';
    }
  });
  svg.innerHTML = html;

  /* List — reversed, same logic as popup.html */
  var listData = data.slice().reverse().filter(function(d){ return d.pct > 0; }).slice(0, 7);
  var list = document.getElementById('historyList');
  var listHtml = '';
  listData.forEach(function(d, i) {
    var isToday = i === 0;
    var bc = barColor(d.pct);
    var barPct = Math.max(d.pct, 6);
    listHtml +=
      '<div class="h-entry">' +
        '<span class="h-entry-date" style="color:' + (isToday ? 'var(--text)' : 'var(--muted)') + ';font-weight:' + (isToday ? 700 : 400) + '">' + d.label + '</span>' +
        '<div class="h-bar-track"><div class="h-bar-fill" style="width:' + barPct + '%;background:' + bc.fill + ';opacity:' + bc.opacity + '"></div></div>' +
        '<span class="h-pct" style="color:' + bc.fill + ';opacity:' + bc.opacity + '">' + d.pct + '%</span>' +
      '</div>';
  });
  list.innerHTML = listHtml;
})();
</script>
</body>
</html>
