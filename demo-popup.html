<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c: #34d399;
  --c-dim: rgba(52,211,153,0.15);
  --border: rgba(255,255,255,0.09);
  --surface: rgba(255,255,255,0.08);
  --text: rgba(255,255,255,0.92);
  --muted: rgba(255,255,255,0.38);
  --r: 16px;
}

html, body {
  width: 300px; height: 440px;
  background: transparent;
  border-radius: var(--r);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  user-select: none;
}

.app {
  width: 100%; height: 100%;
  background: #1d2258;
  border-radius: var(--r);
  display: flex; flex-direction: column;
  overflow: hidden; position: relative;
}

.app::before {
  content: '';
  position: absolute;
  top: -30px; left: 20%;
  transform: translateX(-50%);
  width: 140px; height: 80px;
  background: radial-gradient(ellipse, var(--c-dim) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

.header {
  display: flex; align-items: center;
  padding: 13px 13px 10px; gap: 9px;
  position: relative; z-index: 1;
}

.avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: #34C759; color: rgba(0,0,0,0.72);
  font-size: 11px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; letter-spacing: -0.02em;
}

.id-block { flex: 1; min-width: 0; overflow: hidden; }
.id-name {
  font-size: 12px; font-weight: 600; line-height: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.id-plan {
  font-size: 10px; font-weight: 600; color: #34C759;
  text-transform: uppercase; letter-spacing: 0.04em; margin-top: 3px;
}

.actions { display: flex; gap: 1px; }
.btn-icon {
  width: 26px; height: 26px; background: none; border: none;
  border-radius: 6px; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
}
.btn-icon.active { background: var(--surface); color: var(--text); }

.hero {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
  padding: 16px 16px 12px; gap: 14px; overflow: hidden;
  position: relative; z-index: 1;
}

.hero-top { display: flex; align-items: center; gap: 16px; }

.ring-wrap { position: relative; width: 100px; height: 100px; flex-shrink: 0; }
.ring-svg { transform: rotate(-90deg); }
.ring-bg  { fill: none; stroke: rgba(255,255,255,0.28); stroke-width: 5; }
.ring-glow {
  fill: none; stroke-width: 8; stroke: var(--c); opacity: 0.12;
  stroke-linecap: round; filter: blur(3px);
}
.ring-fill { fill: none; stroke-width: 5; stroke-linecap: round; stroke: var(--c); }

.ring-center {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
.pct-val {
  font-size: 34px; font-weight: 700; letter-spacing: -1.5px;
  line-height: 1; color: var(--c); font-variant-numeric: tabular-nums;
}
.pct-sign {
  font-size: 16px; font-weight: 500; color: var(--c); opacity: 0.7;
  align-self: flex-start; margin-top: 6px;
}

.hero-info { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.hero-label {
  font-size: 11px; font-weight: 600; color: var(--muted);
  letter-spacing: 0.03em; text-transform: uppercase;
}
.hero-countdown {
  font-size: 22px; font-weight: 700; color: var(--text);
  line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -0.5px;
}
.hero-reset { font-size: 11px; color: var(--muted); }
.hero-predict {
  font-size: 10px; font-weight: 600; letter-spacing: 0.01em;
  display: flex; align-items: center; gap: 3px; margin-top: 1px;
  color: var(--c); opacity: 0.65;
}

.usage-detail {
  width: 100%; display: flex; flex-direction: column; gap: 10px;
  padding: 14px 16px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  flex-shrink: 0;
}
.ud-row { display: flex; align-items: center; gap: 10px; }
.ud-label-group { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; width: 105px; }
.ud-label { font-size: 11px; font-weight: 500; color: var(--muted); white-space: nowrap; }
.ud-left  { font-size: 10px; color: var(--muted); opacity: 0.55; font-variant-numeric: tabular-nums; }
.ud-right { flex: 1; display: flex; align-items: center; gap: 8px; min-width: 0; }
.ud-val   { font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--c); min-width: 36px; text-align: right; flex-shrink: 0; }
.ud-bar-track { flex: 1; height: 3px; background: rgba(255,255,255,0.07); border-radius: 99px; }
.ud-bar-fill  { height: 100%; border-radius: 99px; background: var(--c); }

.mini-chart-wrap { width: 100%; display: flex; flex-direction: column; gap: 5px; flex: 1; min-height: 36px; }
.mini-chart-header { display: flex; justify-content: space-between; align-items: center; }
.mini-chart-label {
  font-size: 9px; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--muted); opacity: 0.45;
}
#miniChart { flex: 1; display: block; width: 100%; }

.footer {
  border-top: 1px solid var(--border); padding: 9px 13px;
  display: flex; align-items: center; justify-content: space-between;
  position: relative; z-index: 1;
}
.status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
.dot {
  width: 5px; height: 5px; border-radius: 50%; background: #34C759; flex-shrink: 0;
  animation: pulse-dot 2.4s ease-in-out infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.45;transform:scale(0.85)} }

.trial-footer-badge {
  font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px;
  background: rgba(255,196,0,0.1); color: rgba(255,196,0,0.75); flex-shrink: 0;
}
.btn-open {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 11px; font-weight: 500;
  font-family: inherit; padding: 5px 11px;
  display: flex; align-items: center; gap: 5px; cursor: default;
  letter-spacing: -0.01em;
}
.btn-open-arrow { color: var(--muted); font-size: 10px; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="avatar">MU</div>
    <div class="id-block">
      <div class="id-name">Muhammet C...</div>
      <div class="id-plan">CLAUDE PRO</div>
    </div>
    <div class="actions">
      <div class="btn-icon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-.49-6.5"/>
        </svg>
      </div>
      <div class="btn-icon active">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
          <polyline points="9 21 9 12 15 12 15 21"/>
        </svg>
      </div>
      <div class="btn-icon">
        <svg width="13" height="10" viewBox="0 0 13 10" fill="currentColor">
          <rect x="0" y="6" width="3" height="4" rx="1"/>
          <rect x="5" y="3" width="3" height="7" rx="1"/>
          <rect x="10" y="0" width="3" height="10" rx="1"/>
        </svg>
      </div>
      <div class="btn-icon">
        <svg width="13" height="13" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
        </svg>
      </div>
      <div class="btn-icon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="hero">
    <div class="hero-top">
      <div class="ring-wrap">
        <svg class="ring-svg" width="100" height="100" viewBox="0 0 100 100">
          <circle class="ring-bg"   cx="50" cy="50" r="40"/>
          <circle class="ring-glow" cx="50" cy="50" r="40"
            stroke-dasharray="251.33" stroke-dashoffset="155.8"/>
          <circle class="ring-fill" cx="50" cy="50" r="40"
            stroke-dasharray="251.33" stroke-dashoffset="155.8"/>
        </svg>
        <div class="ring-center">
          <div style="display:flex;align-items:flex-start;line-height:1">
            <span class="pct-val">38</span><span class="pct-sign">%</span>
          </div>
        </div>
      </div>
      <div class="hero-info">
        <div class="hero-label">Current session</div>
        <div class="hero-countdown">3h 49m left</div>
        <div class="hero-reset">Resets at 05:20 AM</div>
        <div class="hero-predict" style="color:#FF9500;opacity:1">⚡ limit in ~1h 18m</div>
      </div>
    </div>

    <div class="usage-detail">
      <div class="ud-row">
        <div class="ud-label-group">
          <div class="ud-label">All sessions</div>
          <div class="ud-left">5d 10h left</div>
        </div>
        <div class="ud-right">
          <span class="ud-val">72%</span>
          <div class="ud-bar-track"><div class="ud-bar-fill" style="width:72%"></div></div>
        </div>
      </div>
      <div class="ud-row">
        <div class="ud-label-group">
          <div class="ud-label">Fable</div>
          <div class="ud-left">5d 10h left</div>
        </div>
        <div class="ud-right">
          <span class="ud-val">43%</span>
          <div class="ud-bar-track"><div class="ud-bar-fill" style="width:43%"></div></div>
        </div>
      </div>
      <div class="ud-row">
        <div class="ud-label-group">
          <div class="ud-label">Extra usage</div>
          <div class="ud-left">$2.50 / $10.00</div>
        </div>
        <div class="ud-right">
          <span class="ud-val" style="color:rgba(255,196,0,0.85)">25%</span>
          <div class="ud-bar-track"><div class="ud-bar-fill" style="width:25%;background:rgba(255,196,0,0.75)"></div></div>
        </div>
      </div>
    </div>

    <div class="mini-chart-wrap">
      <div class="mini-chart-header">
        <div style="display:flex;align-items:center;gap:5px">
          <span class="mini-chart-label">Last 14 days</span>
          <span class="mini-chart-label" style="opacity:0.7">AVG 61%</span>
        </div>
        <span class="mini-chart-label">Today</span>
      </div>
      <svg id="miniChart" viewBox="0 0 268 40" preserveAspectRatio="none" style="width:100%;height:100%;display:block;overflow:visible"></svg>
    </div>
  </div>

  <div class="footer">
    <div class="status">
      <div class="dot"></div>
      <span id="popup-time">Live · --:-- --</span>
    </div>
<div class="btn-open">claude.ai <span class="btn-open-arrow">↗</span></div>
  </div>

</div>
<script>
(function() {
  var el = document.getElementById('popup-time');
  if (el) el.textContent = 'Live · 1:30 AM';
})();

(function() {
  // same data as demo-history.html
  const data = [65, 0, 0, 60, 45, 0, 0, 52, 65, 58, 100, 48, 74, 38];
  const AVG = 0.61;
  const svg = document.getElementById('miniChart');
  const W = 268, H = 40, n = data.length;
  const gap = 2;
  const barW = Math.floor((W - gap*(n-1)) / n);

  var avgY = H - Math.round(AVG * (H - 2));
  var dash = document.createElementNS('http://www.w3.org/2000/svg','line');
  dash.setAttribute('x1', 0); dash.setAttribute('x2', W);
  dash.setAttribute('y1', avgY); dash.setAttribute('y2', avgY);
  dash.setAttribute('stroke', 'rgba(255,255,255,0.18)');
  dash.setAttribute('stroke-width', '1');
  dash.setAttribute('stroke-dasharray', '3 3');
  svg.appendChild(dash);

  function barColor(v) {
    if (!v) return { fill: 'rgba(255,255,255,0.07)', opacity: 1 };
    if (v < 30) return { fill: '#34C759', opacity: 0.25 };
    if (v < 60) return { fill: '#34C759', opacity: 0.55 };
    if (v < 80) return { fill: '#34C759', opacity: 0.80 };
    return { fill: '#34C759', opacity: 1 };
  }

  data.forEach(function(v, i) {
    var barH = v ? Math.max(2, Math.round(v / 100 * (H - 2))) : 2;
    var x = i * (barW + gap);
    var y = H - barH;
    var isToday = i === n - 1;
    var bc = barColor(v);
    var opacity = isToday ? 1 : bc.opacity * 0.85;
    var rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x', x); rect.setAttribute('y', y);
    rect.setAttribute('width', barW); rect.setAttribute('height', barH);
    rect.setAttribute('rx', '2');
    rect.setAttribute('fill', v ? bc.fill : 'rgba(255,255,255,0.07)');
    rect.setAttribute('opacity', v ? opacity : 1);
    svg.appendChild(rect);
  });
})();
</script>
</body>
</html>
